services:
  app:
    image: public.ecr.aws/docker/library/golang:1.24
    container_name: rediscli-app
    working_dir: /app
    volumes:
      - ./:/app
      # Cache Go modules to speed up builds
      - go-modules:/go/pkg/mod
      - go-cache:/root/.cache/go-build
    environment:
      # Go environment variables
      - CGO_ENABLED=0
      - GOOS=linux
      - GOARCH=amd64
      # Redis connection settings for testing (using existing Redis)
      - REDIS_HOST=local-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=1
    command: |
      sh -c "
        echo 'Building rediscli...' &&
        go build -o rediscli . &&
        echo 'Testing Redis commands...' &&
        echo '' &&
        echo '=== Testing PING ===' &&
        ./rediscli PING &&
        echo '' &&
        echo '=== Testing SET ===' &&
        ./rediscli SET test_key 'Hello Redis' &&
        echo '' &&
        echo '=== Testing GET ===' &&
        ./rediscli GET test_key &&
        echo '' &&
        echo '=== Testing KEYS ===' &&
        ./rediscli KEYS '*' &&
        echo '' &&
        echo 'All Redis commands tested successfully!'
      "
    networks:
      - dbs_dbsnet

volumes:
  go-modules:
    driver: local
  go-cache:
    driver: local

networks:
  dbs_dbsnet:
    external: true
